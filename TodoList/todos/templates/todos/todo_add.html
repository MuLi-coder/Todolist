<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增待办</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; text-align: center; }
        
        form {
            background: #f4f4f4;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        
        /* 让输入框占满宽度 */
        input[type="text"], 
        input[type="datetime-local"], 
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* 确保 padding 不撑大宽度 */
            font-size: 1em;
        }
        
        textarea { resize: vertical; height: 100px; }
        
        .btn-submit {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-submit:hover { background-color: #0056b3; }
        
        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
        }
        .error { color: #dc3545; font-size: 0.85em; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>✨ 新增待办事项</h1>

    <form method="post">
        {% csrf_token %}
        
        <!-- 手动渲染每个字段，以便控制样式和显示错误信息 -->
        
        <div class="form-group">
            <label for="{{ form.title.id_for_label }}">标题</label>
            {{ form.title }}
            {% if form.title.errors %}
                <div class="error">{{ form.title.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="form-group">
            <label for="{{ form.content.id_for_label }}">详细内容</label>
            {{ form.content }}
            {% if form.content.errors %}
                <div class="error">{{ form.content.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="form-group">
            <label for="{{ form.time.id_for_label }}">截止时间</label>
            {{ form.time }}
            {% if form.time.errors %}
                <div class="error">{{ form.time.errors.0 }}</div>
            {% endif %}
        </div>

        <button type="submit" class="btn-submit">保存任务</button>
    </form>

    <a href="{% url 'todo_list' %}" class="cancel-link">← 返回列表</a>

</body>
</html>
